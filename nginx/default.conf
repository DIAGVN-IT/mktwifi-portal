map $http_x_request_id $portal_request_id {
    default $request_id;
    "~^[A-Za-z0-9._:-]{1,128}$" $http_x_request_id;
}

log_format portal_json escape=json '{"timestamp":"$time_iso8601","remoteAddr":"$remote_addr","xForwardedFor":"$proxy_add_x_forwarded_for","requestId":"$portal_request_id","host":"$host","method":"$request_method","requestUri":"$request_uri","status":$status,"bodyBytesSent":$body_bytes_sent,"requestTime":$request_time,"upstreamAddr":"$upstream_addr","upstreamStatus":"$upstream_status","upstreamResponseTime":"$upstream_response_time"}';

server {
    listen 80;
    server_name _;

    access_log /dev/stdout portal_json;
    error_log /dev/stderr warn;

    charset utf-8;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://portal-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $portal_request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 20s;
        proxy_read_timeout 40s;
    }

    location ^~ /guest/ {
        max_ranges 0;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public";
    }
}


server {
    listen 443 ssl;
    server_name _;

    access_log /dev/stdout portal_json;
    error_log /dev/stderr warn;

    ssl_certificate /etc/nginx/certs/2026/diag_20260509.fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/2026/diag_20260509.key;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://portal-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $portal_request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 20s;
        proxy_read_timeout 40s;
    }

    location ^~ /guest/ {
        max_ranges 0;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
