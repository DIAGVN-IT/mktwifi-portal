services:
  portal-web:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - portal-api

  portal-api:
    build: ./api
    environment:
      UNIFI_BASE: "${UNIFI_BASE}"
      UNIFI_API_KEY: "${UNIFI_API_KEY}"
      UNIFI_SITE: "${UNIFI_SITE}"
      POST_AUTH_DELAY_MS: "${POST_AUTH_DELAY_MS}"
      BRANCH_MAP_PATH: "/app/branch-map.json"
    volumes:
      - ./config/branch-map.json:/app/branch-map.json:ro
    extra_hosts:
      - "diag-unifi.diag.vn:192.168.5.115"
